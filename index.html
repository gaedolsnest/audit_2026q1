<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>정기 재고조사 점수조회</title>
  <link rel="icon" href="favicon.ico?v=1" />
  <link rel="stylesheet" href="style.css?v=dashboard1" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><img src="favicon.ico?v=1" alt="" /></div>
        <div><strong>정기 재고조사</strong><span>지역별 점수조회</span></div>
      </div>
      <div class="side-label">분기</div>
      <div class="side-list" id="quarterSide">
        <button class="side-item active" type="button">2026 Q1</button>
      </div>
      <div class="side-label">지역</div>
      <div class="side-list" id="regionSide"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>정기 재고조사 점수조회</h1>
          <p class="subtitle">왼쪽에서 지역을 선택하고 암호를 입력하면 해당 지역 데이터만 표시됩니다.</p>
        </div>
        <div class="session" id="sessionBadge"><span class="dot"></span> 데이터 로드 중</div>
      </header>

      <section class="login-panel" id="loginToolbar">
        <div class="selected-region-card">
          <span>선택 지역</span>
          <strong id="selectedRegionName">-</strong>
          <small>왼쪽 지역 목록에서 변경할 수 있습니다.</small>
        </div>
        <div class="login-controls">
          <input id="codeInput" type="password" placeholder="지역 암호 입력" />
          <button class="primary" id="enterBtn" type="button">접속</button>
        </div>
        <div class="scope-note">
          <strong>표시 범위</strong>
          <span>내 지역 상세 점수와 담당자 평균 산정에 필요한 타지역 점수 요약을 함께 표시합니다.</span>
        </div>
      </section>
      <p class="notice" id="loginNotice">선택한 지역 암호로 접속하면 해당 지역 기준 평가 내역이 표시됩니다.</p>

      <section class="summary hidden" id="summaryGrid">
        <div class="metric"><span>조회 지역</span><strong id="metricRegion">-</strong></div>
        <div class="metric"><span>대상 점포</span><strong id="metricStores">-</strong></div>
        <div class="metric"><span>평가 인원</span><strong id="metricRows">-</strong></div>
        <div class="metric"><span>평균 점수</span><strong id="metricAvg">-</strong></div>
      </section>

      <section class="toolbar search hidden" id="searchToolbar">
        <input id="qInput" type="search" placeholder="내 지역 안에서 점포명 또는 성명 검색" />
        <button class="secondary" id="resetBtn" type="button">초기화</button>
        <button class="secondary" id="logoutBtn" type="button">다른 지역 접속</button>
      </section>

      <section class="content hidden" id="contentGrid">
        <div class="table-card">
          <div class="card-head"><strong>조회 결과</strong><span id="resultHint">행을 선택하면 상세 표시</span></div>
          <div class="table-wrap">
            <table id="resultTable">
              <thead>
                <tr>
                  <th>구분</th><th>점포</th><th>성명</th><th>사번</th><th>직책</th><th class="num">점수</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <aside class="detail-card">
          <div class="card-head"><strong>상세</strong><span id="detailScope">선택 대기</span></div>
          <div class="detail-body" id="detailBody">
            <div class="empty">조회 결과에서 행을 선택하세요.</div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script src="app.js?v=dashboard1"></script>
</body>
</html>

<!doctype html>
body { outline: 12px solid hotpink !important; }
.header h1 { color: #e6e6e6 !important; text-shadow: 0 2px 10px rgba(0,0,0,0.6) !important; }
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>26 Q1 재고 조사 점수조회_지역별</title>
  <link rel="stylesheet" href="style.css?v=2026q1_999" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>26 Q1 재고 조사 점수조회_지역별</h1>
      <p class="muted">지역 + 암호 조회</p>
    </header>

    <section class="card">
      <div class="row">
        <label>지역</label>
        <select id="ddSelect"></select>
      </div>

      <div class="row">
        <label>암호</label>
        <input id="codeInput" type="password" placeholder="지역 암호 입력" />
      </div>

      <div class="row">
        <label>검색(점포/성명)</label>
        <input id="qInput" type="text" placeholder="예: 김포 / 홍길동" />
      </div>

      <div class="actions">
        <button id="loadBtn">데이터 로드</button>
        <button id="searchBtn">조회</button>
        <button id="resetBtn" class="ghost">초기화</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table id="resultTable">
          <thead>
            <tr>
              <th>지역</th>
              <th>점포</th>
              <th>성명</th>
              <th>사번</th>
              <th>직책</th>
              <th class="num">점수</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="muted small">행 클릭 → 상세</p>
    </section>
  </main>

  <dialog id="detailDlg">
    <div class="dlg">
      <div class="dlg-head">
        <h3 id="dlgTitle">상세</h3>
        <button id="dlgClose" class="ghost">닫기</button>
      </div>
      <div id="dlgBody" class="dlg-body"></div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
